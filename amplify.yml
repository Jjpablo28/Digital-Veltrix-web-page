version: 1
frontend:
  phases:
    preBuild:
      commands:
        # ¡CRUCIAL! Cambiamos el directorio a donde realmente está tu package.json y package-lock.json
        - cd Front-Angular/Front
        - npm ci
    build:
      commands:
        # Estos comandos se ejecutarán desde Front-Angular/Front
        # Eliminamos --project Front porque ya estamos en la raíz del proyecto 'Front'
        - npm run build -- --configuration production
  artifacts:
    # ***** ¡CAMBIO AQUÍ! *****
    # La ruta baseDirectory debe ser relativa a la raíz del REPOSITORIO
    # Asegúrate de que esta ruta completa sea correcta:
    baseDirectory: Front-Angular/Front/dist/browser
    files:
      - '**/*'
  cache:
    paths:
      # La ruta del caché también es relativa a la raíz del REPOSITORIO
      - Front-Angular/Front/node_modules/**/*
