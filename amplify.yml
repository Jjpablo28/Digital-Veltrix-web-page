version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd Front-Angular
        - npm ci
    build:
      commands:
        - npm run build -- --configuration production --project Front --configuration production
  artifacts:
    baseDirectory: Front-Angular/Front/dist/browser
    files:
      - '**/*'
  cache:
    paths:
      - Front-Angular/node_modules/**/*
