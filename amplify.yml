version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd Front-Angular/Front
        - npm ci
    build:
      commands:
        - npm run build -- --configuration production
    postBuild:
      commands:
        - cp -R dist/browser/* $CODEBUILD_SRC_DIR/
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
  cache:
    paths:
      - Front-Angular/Front/node_modules/**/*
