version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Nos movemos al directorio del proyecto Angular
        - cd Front-Angular/Front
        - npm ci
    build:
      commands:
        # Compila la aplicación Angular en modo producción.
        # Esto genera la carpeta 'dist/browser' dentro de 'Front-Angular/Front'.
        - npm run build -- --configuration production
  artifacts:
    # El baseDirectory debe ser la ruta a la carpeta 'browser' que contiene el index.html,
    # relativa a la raíz de TU REPOSITORIO (Digital-Veltrix-web-page).
    baseDirectory: Front-Angular/Front/dist/browser
    files:
      - '**/*'
  cache:
    paths:
      - Front-Angular/Front/node_modules/**/*
