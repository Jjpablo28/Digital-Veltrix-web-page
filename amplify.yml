version: 1
frontend:
  phases:
    preBuild:
      commands:
        # - cd Front-Angular/Front # <--- ¡ELIMINAR ESTA LÍNEA!
        - npm ci
    build:
      commands:
        # Modificar el comando de build para apuntar al proyecto y generar en la raíz de ese proyecto
        - ng build --configuration production --project Front --output-path Front-Angular/Front
  artifacts:
    # Ahora la baseDirectory es el proyecto en sí, si el output se genera allí
    baseDirectory: Front-Angular/Front
    files:
      - '**/*'
  cache:
    paths:
      - Front-Angular/Front/node_modules/**/*
