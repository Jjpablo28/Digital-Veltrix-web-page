<nav>
  <div class="topappbar">

    <!-- Logo + Título -->
    <div class="nav-header">
      <div class="leading-icon">
        <a href="/" routerLink="/">
          <img src="https://res.cloudinary.com/dzueiucg9/image/upload/c_scale,h_105,w_105/Logo_fcmscv.png" alt="Logo" />
        </a>
      </div>

      <a href="/" routerLink="/" class="headline">
        {{ 'NAV.BRAND' | translate }}
      </a>
    </div>

    <!-- Contenedor combinado para idioma + botones -->
    <div class="nav-controls">

      <!-- Selector de idioma -->
      <div class="language-wrapper">
        <div class="language-selector" (click)="toggleDropdown($event)">
          <button class="lang-btn">
            <img [src]="selectedLanguage.flag" width="20" alt="{{ selectedLanguage.label }}" />
            <span>{{ selectedLanguage.label }}</span>
          </button>

          <div *ngIf="showDropdown" class="dropdown">
            <div
              *ngFor="let lang of languages"
              (click)="changeLanguage(lang, $event)"
              class="dropdown-item"
            >
              <img [src]="lang.flag" width="20" alt="{{ lang.label }}" />
              {{ lang.label }}
            </div>
          </div>
        </div>
      </div>

      <!-- Botones de navegación -->
      <div class="nav-actions">

        <!-- Nosotros -->
        <button class="btn" (click)="scrollToId('nosotros')">
          <a href="#nosotros" style="display:none;">Nosotros</a>
          {{ 'NAV.WHO_WE_ARE' | translate }}
        </button>

        <!-- Servicios -->
        <button class="btn" (click)="scrollToId('servicios')">
          <a href="#servicios" style="display:none;">Servicios</a>
          {{ 'NAV.WHAT_WE_OFFER' | translate }}
        </button>

        <!-- Contacto -->
        <button class="btn" (click)="scrollToId('contacto')">
          <a href="#contacto" style="display:none;">Contacto</a>
          {{ 'NAV.CONTACT_US' | translate }}
        </button>

      </div>
    </div>

  </div>
</nav>
